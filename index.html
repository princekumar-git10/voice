<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaVoice - AI Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg-color: #030712;
            --surface: rgba(17, 24, 39, 0.45);
            --surface-hover: rgba(31, 41, 55, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.4);
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.4);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.2);
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --font-display: 'Space Grotesk', sans-serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient animated backgrounds */
        .glow-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .glow-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            animation: pulse-glow 10s infinite alternate ease-in-out;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: #4f46e5;
            animation-duration: 12s;
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: #06b6d4;
            animation-duration: 15s;
        }

        .blob-3 {
            top: 35%;
            left: 25%;
            width: 35vw;
            height: 35vw;
            background: #7c2d12;
            animation-duration: 18s;
            opacity: 0.06;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.15) translate(3%, 3%); }
        }

        .main-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem 2rem 2.5rem;
            width: 90%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: var(--card-shadow);
            position: relative;
            z-index: 10;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .main-card:hover {
            border-color: var(--border-hover);
        }

        .app-title-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .app-title-container h1 {
            font-family: var(--font-display);
            font-size: 2.25rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        .app-title-container p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin: 0;
            font-weight: 400;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.03);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.825rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.625rem;
            border: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.3s ease;
        }

        .dot.live {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
            animation: pulse-dot 1.5s infinite alternate;
        }

        .dot.speaking {
            background: #60a5fa;
            box-shadow: 0 0 12px #60a5fa;
            animation: pulse-dot 1.2s infinite alternate;
        }

        @keyframes pulse-dot {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .orb-container {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2.5rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.01);
            border: 1px dashed rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .orb-container.speaking-mode {
            border-color: rgba(96, 165, 250, 0.2);
            background: rgba(37, 99, 235, 0.03);
        }

        .call-button {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.8) 0%, rgba(17, 24, 39, 0.8) 100%);
            color: var(--text-main);
            font-size: 2.25rem;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .call-button:hover {
            transform: translateY(-2px) scale(1.03);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.15);
        }

        .call-button:active {
            transform: translateY(1px) scale(0.98);
        }

        /* The visualizer will dynamically inject scale values here */
        .call-button.active {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
            color: white;
            box-shadow: 0 8px 32px var(--danger-glow);
            transform: scale(var(--mic-scale, 1));
            border-color: rgba(255, 255, 255, 0.2);
        }

        .ring {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #3b82f6;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
            transform: scale(var(--ai-scale, 1));
            transition: transform 0.05s ease-out, opacity 0.2s ease;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .speaking-mode .ring {
            opacity: 0.8;
            border-color: #60a5fa;
            box-shadow: 0 0 30px rgba(96, 165, 250, 0.4);
        }

        .transcript-container {
            width: 100%;
            height: 280px;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 16px;
            padding: 1.25rem;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        /* Scrollbar Styling */
        .transcript-container::-webkit-scrollbar {
            width: 6px;
        }

        .transcript-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .transcript-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        .transcript-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .message {
            font-size: 0.925rem;
            line-height: 1.6;
            padding: 0.75rem 1.125rem;
            border-radius: 16px;
            max-width: 85%;
            width: fit-content;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            animation: message-appear 0.25s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
            box-sizing: border-box;
        }

        @keyframes message-appear {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            align-self: flex-end;
            color: #f3f4f6;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.12) 0%, rgba(6, 182, 212, 0.05) 100%);
            border: 1px solid rgba(59, 130, 246, 0.2);
            align-self: flex-start;
            color: #93c5fd;
            border-bottom-left-radius: 4px;
        }

        .system-msg {
            align-self: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-style: normal;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 0.375rem 0.875rem;
            border-radius: 20px;
            letter-spacing: 0.02em;
            text-align: center;
        }

        .tool-card {
            align-self: center;
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            border-radius: 12px;
            padding: 0.875rem 1.125rem;
            width: 100%;
            box-sizing: border-box;
            white-space: pre-wrap;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.05);
            position: relative;
            overflow: hidden;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--success);
        }

        /* Setup Modal & Card */
        .setup-modal {
            position: fixed;
            inset: 0;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1.5rem;
            box-sizing: border-box;
            transition: all 0.4s ease;
        }

        .setup-modal.hidden {
            display: none !important;
        }

        .setup-card {
            background: rgba(17, 24, 39, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: var(--card-shadow), 0 0 80px rgba(59, 130, 246, 0.1);
            box-sizing: border-box;
            text-align: center;
            transform: scale(1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .setup-logo {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            background: var(--accent-gradient);
            border-radius: 24px;
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
        }

        .setup-card h2 {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(135deg, #ffffff 50%, #d1d5db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .setup-subtitle {
            font-size: 0.925rem;
            color: var(--text-muted);
            margin: 0 0 2rem 0;
            font-weight: 400;
        }

        .input-wrapper {
            width: 100%;
            position: relative;
            margin-bottom: 1.5rem;
        }

        .api-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(3, 7, 18, 0.6);
            color: white;
            box-sizing: border-box;
            font-size: 0.95rem;
            font-family: var(--font-mono);
            transition: all 0.3s ease;
            text-align: center;
        }

        .api-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(3, 7, 18, 0.8);
        }

        .btn-start {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border: none;
            font-weight: 600;
            font-family: var(--font-sans);
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
            transition: all 0.3s ease;
        }

        .btn-start:hover {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
            transform: translateY(-1px);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        .key-hint {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #60a5fa;
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 500;
        }

        .key-hint:hover {
            color: #93c5fd;
            text-decoration: underline;
        }

        /* Image Lightbox Modal */
        .image-modal {
            position: fixed;
            inset: 0;
            background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 1;
            transition: opacity 0.3s ease;
            padding: 1.5rem;
            box-sizing: border-box;
        }

        .image-modal.hidden {
            display: none !important;
        }

        .image-modal-content {
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--card-shadow), 0 0 100px rgba(96, 165, 250, 0.15);
            display: flex;
            flex-direction: column;
            position: relative;
            animation: modal-zoom-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
        }

        @keyframes modal-zoom-in {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .image-modal-close {
            position: absolute;
            top: 1rem;
            right: 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 1.5rem;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }

        .image-modal-close:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .image-modal-header {
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }

        .image-modal-header h3 {
            margin: 0;
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 700;
            color: #f3f4f6;
        }

        .image-modal-header p {
            margin: 0.25rem 0 0 0;
            font-size: 0.875rem;
            color: var(--text-muted);
            font-style: italic;
            word-wrap: break-word;
        }

        .image-modal-body {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .image-modal-body img {
            max-width: 100%;
            max-height: 50vh;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            object-fit: contain;
        }

        .image-modal-footer {
            padding: 1rem 1.5rem 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
        }

        .btn-download {
            display: inline-block;
            text-align: center;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-download:hover {
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

    <div class="glow-bg">
        <div class="glow-blob blob-1"></div>
        <div class="glow-blob blob-2"></div>
        <div class="glow-blob blob-3"></div>
    </div>

    <div id="setupModal" class="setup-modal">
        <div class="setup-card">
            <div class="setup-logo">🎙️</div>
            <h2>Welcome to NovaVoice</h2>
            <p class="setup-subtitle">Connect your Gemini Live session to begin</p>
            <div class="input-wrapper">
                <input type="password" id="apiKey" class="api-input" placeholder="Enter Gemini API Key (AIza...)">
            </div>
            <button id="startSessionBtn" class="btn-start">Connect to Agent</button>
            <a href="https://aistudio.google.com/" target="_blank" class="key-hint">Need an API key? Get one from Google AI Studio</a>
        </div>
    </div>

    <div class="main-card">
        <div class="status-badge" id="statusBadge">
            <div class="dot" id="statusDot"></div>
            <span id="statusText">Disconnected</span>
        </div>

        <div class="app-title-container">
            <h1>NovaVoice AI</h1>
            <p>Real-time conversational voice assistant</p>
        </div>

        <div class="orb-container" id="orbContainer">
            <div class="ring"></div>
            <button class="call-button" id="callBtn">🎙️</button>
        </div>

        <div class="transcript-container" id="transcript">
            <div class="message system-msg">Waiting to connect...</div>
        </div>
    </div>

    <!-- Image Preview Lightbox Modal -->
    <div id="imageModal" class="image-modal hidden">
        <div class="image-modal-content">
            <button class="image-modal-close" id="closeImageModalBtn">&times;</button>
            <div class="image-modal-header">
                <h3>🎨 Generated Artwork</h3>
                <p id="imageModalPrompt">"Prompt description"</p>
            </div>
            <div class="image-modal-body">
                <img id="imageModalSrc" src="" alt="Generated artwork">
            </div>
            <div class="image-modal-footer">
                <a id="downloadImageBtn" href="#" download="novavoice-artwork.png" class="btn-download" target="_blank">Download Image</a>
            </div>
        </div>
    </div>

    <script>
        const UI = {
            setupModal: document.getElementById('setupModal'),
            startBtn: document.getElementById('startSessionBtn'),
            apiKeyInput: document.getElementById('apiKey'),
            callBtn: document.getElementById('callBtn'),
            statusText: document.getElementById('statusText'),
            statusDot: document.getElementById('statusDot'),
            transcript: document.getElementById('transcript'),
            orbContainer: document.getElementById('orbContainer'),
            imageModal: document.getElementById('imageModal'),
            closeImageModalBtn: document.getElementById('closeImageModalBtn'),
            imageModalPrompt: document.getElementById('imageModalPrompt'),
            imageModalSrc: document.getElementById('imageModalSrc'),
            downloadImageBtn: document.getElementById('downloadImageBtn')
        };

        let isCallActive = false;
        let ws = null;
        let audioContext = null;
        let mediaStream = null;
        let scriptProcessor = null;
        let nextPlayTime = 0;

        let activeBubble = null;
        let activeRole = null;
        let activeSources = [];

        // Visualizer Nodes
        let micAnalyser = null;
        let aiAnalyser = null;
        let visualizerId = null;

        UI.startBtn.addEventListener('click', () => {
            const key = UI.apiKeyInput.value.trim();
            if (!key) return alert("API Key is required.");

            UI.setupModal.classList.add('hidden');
            updateStatus('Connecting...', 'speaking');
            addMessage('Initializing connection to Gemini...', 'system-msg');

            const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${key}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                updateStatus('Ready', 'muted');
                addMessage('System ready. Tap the mic to call.', 'system-msg');

                // 🧠 CONTEXT INJECTION: Give Gemini the exact date and timezone
                const currentDate = new Date().toString();
                const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const systemPrompt = `You are a professional, helpful assistant. 
                CRITICAL CONTEXT: The current date and time is ${currentDate}. The user is in the ${timeZone} timezone. 
                Always check availability first before booking a meeting to prevent double-booking. When booking or checking, format dates strictly to ISO 8601 offset to the user's timezone.
                You can also open desktop applications (like WhatsApp, Chrome, Spotify, Calculator, Notes) or websites (like YouTube, Gmail) on the user's computer when requested using the open_application tool.
                You can also generate/make images of things using the generate_image tool when requested by the user.`;

                ws.send(JSON.stringify({
                    setup: {
                        model: "models/gemini-3.1-flash-live-preview",
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Charon" } } }
                        },
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        tools: [{
                            functionDeclarations: [
                                {
                                    name: "check_availability",
                                    description: "Checks the user's calendar for busy slots on a given day.",
                                    parameters: {
                                        type: "OBJECT",
                                        properties: {
                                            date: { type: "STRING", description: "ISO 8601 date to check (e.g., 2026-05-26T00:00:00+05:30)" }
                                        },
                                        required: ["date"]
                                    }
                                },
                                {
                                    name: "book_meeting",
                                    description: "Schedules a meeting on the calendar.",
                                    parameters: {
                                        type: "OBJECT",
                                        properties: {
                                            title: { type: "STRING", description: "Meeting title" },
                                            date_time: { type: "STRING", description: "ISO 8601 date and time (e.g., 2026-05-26T09:00:00+05:30)" },
                                            guest_email: { type: "STRING", description: "Guest email address" }
                                        },
                                        required: ["title", "date_time", "guest_email"]
                                    }
                                },
                                {
                                    name: "open_application",
                                    description: "Opens a basic desktop application (e.g., WhatsApp, Chrome, Spotify, Calculator, Notes) or a website (e.g., YouTube, Gmail) on the user's computer.",
                                    parameters: {
                                        type: "OBJECT",
                                        properties: {
                                            application_name: { type: "STRING", description: "Name of the application or website to open (e.g., WhatsApp, YouTube, Chrome, Spotify)" }
                                        },
                                        required: ["application_name"]
                                    }
                                },
                                {
                                    name: "generate_image",
                                    description: "Generates an image of something based on user prompt and shows it on the screen.",
                                    parameters: {
                                        type: "OBJECT",
                                        properties: {
                                            prompt: { type: "STRING", description: "Detailed description of the image to generate" }
                                        },
                                        required: ["prompt"]
                                    }
                                }
                            ]
                        }]
                    }
                }));
            };

            ws.onmessage = async (event) => {
                const msg = JSON.parse(await event.data.text ? await event.data.text() : event.data);

                if (msg.toolCall) {
                    const functionCalls = msg.toolCall.functionCalls;
                    const responses = [];

                    for (const call of functionCalls) {
                        const args = call.args;
                        console.log("🎯 Tool Triggered:", call.name, args);

                        const apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') 
                            ? 'http://127.0.0.1:5000' 
                            : '';

                        let endpoint = "";
                        let visualOutput = "";

                        // Handle logic for tools dynamically
                        if (call.name === "book_meeting") {
                            endpoint = `${apiBase}/api/book_meeting`;
                            visualOutput = `⚙️ Action: book_meeting()\n↳ Title: ${args.title}\n↳ Time: ${args.date_time}`;
                        } else if (call.name === "check_availability") {
                            endpoint = `${apiBase}/api/check_availability`;
                            visualOutput = `🔍 Action: check_availability()\n↳ Date: ${args.date}`;
                        } else if (call.name === "open_application") {
                            endpoint = `${apiBase}/api/open_application`;
                            visualOutput = `🚀 Action: open_application()\n↳ App: ${args.application_name}`;
                        } else if (call.name === "generate_image") {
                            endpoint = `${apiBase}/api/generate_image`;
                            visualOutput = `🎨 Action: generate_image()\n↳ Prompt: ${args.prompt}`;
                        }

                        addToolCard(visualOutput);

                        try {
                            const res = await fetch(endpoint, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(args)
                            });
                            const data = await res.json();
                            
                            if (call.name === "generate_image" && data.image_url) {
                                addImageMessage(data.image_url, args.prompt, "ai-msg");
                            }

                            if (call.name === "open_application" && data.url) {
                                window.open(data.url, '_blank');
                            }
                            
                            responses.push({ id: call.id, name: call.name, response: { output: data.result } });
                        } catch (error) {
                            console.error("Backend Error:", error);
                            responses.push({ id: call.id, name: call.name, response: { output: "Error connected to local Python API." } });
                        }
                    }

                    ws.send(JSON.stringify({ toolResponse: { functionResponses: responses } }));
                }

                if (msg.serverContent) {
                    const content = msg.serverContent;

                    if (content.interrupted) {
                        setSpeakingState(false);
                        nextPlayTime = audioContext ? audioContext.currentTime : 0;
                        activeBubble = null;
                        activeSources.forEach(source => { try { source.stop(); } catch (e) { } });
                        activeSources = [];
                    }

                    if (content.inputTranscription && content.inputTranscription.text) {
                        addMessage(content.inputTranscription.text + " ", 'user-msg', true);
                    }

                    if (content.outputTranscription && content.outputTranscription.text) {
                        setSpeakingState(true);
                        addMessage(content.outputTranscription.text, 'ai-msg', true);
                    }

                    if (content.modelTurn) {
                        for (const part of content.modelTurn.parts) {
                            if (part.inlineData) {
                                playAudioBase64(part.inlineData.data);
                            }
                        }
                    }

                    if (content.turnComplete) {
                        setSpeakingState(false);
                        activeBubble = null;
                    }
                }
            };
        });

        UI.callBtn.addEventListener('click', async () => {
            isCallActive = !isCallActive;

            if (isCallActive) {
                UI.callBtn.classList.add('active');
                UI.callBtn.innerHTML = '⏹️';
                updateStatus('Listening...', 'live');
                addMessage('Microphone active. Say hello!', 'system-msg');

                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                    nextPlayTime = audioContext.currentTime;

                    // Setup Visualizers
                    micAnalyser = audioContext.createAnalyser();
                    aiAnalyser = audioContext.createAnalyser();
                    micAnalyser.fftSize = 256;
                    aiAnalyser.fftSize = 256;
                    startVisualizer();

                    mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: { echoCancellation: true, noiseSuppression: true }
                    });

                    const source = audioContext.createMediaStreamSource(mediaStream);
                    source.connect(micAnalyser); // Connect Mic to Analyser

                    scriptProcessor = audioContext.createScriptProcessor(1024, 1, 1);
                    scriptProcessor.onaudioprocess = (e) => {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            const float32Data = e.inputBuffer.getChannelData(0);
                            ws.send(JSON.stringify({
                                realtimeInput: {
                                    audio: { mimeType: "audio/pcm;rate=16000", data: float32ToBase64(float32Data) }
                                }
                            }));
                        }
                    };

                    source.connect(scriptProcessor);
                    scriptProcessor.connect(audioContext.destination);

                } catch (err) {
                    isCallActive = false;
                    UI.callBtn.classList.remove('active');
                    UI.callBtn.innerHTML = '🎙️';
                    updateStatus('Ready', 'muted');
                }
            } else {
                UI.callBtn.classList.remove('active');
                UI.callBtn.innerHTML = '🎙️';
                UI.orbContainer.classList.remove('speaking-mode');
                updateStatus('Call Ended', 'muted');

                if (visualizerId) cancelAnimationFrame(visualizerId);
                UI.callBtn.style.setProperty('--mic-scale', '1');
                UI.orbContainer.style.setProperty('--ai-scale', '1');

                if (scriptProcessor) scriptProcessor.disconnect();
                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                if (audioContext) audioContext.close();
            }
        });

        // 🎵 VISUALIZER ENGINE
        function startVisualizer() {
            const micData = new Uint8Array(micAnalyser.frequencyBinCount);
            const aiData = new Uint8Array(aiAnalyser.frequencyBinCount);

            function render() {
                if (!isCallActive) return;

                micAnalyser.getByteFrequencyData(micData);
                aiAnalyser.getByteFrequencyData(aiData);

                // Calculate average volume
                const micVol = micData.reduce((a, b) => a + b, 0) / micData.length;
                const aiVol = aiData.reduce((a, b) => a + b, 0) / aiData.length;

                // Map volume (0-255) to scale factor (1.0 to 1.3)
                const micScale = 1 + (micVol / 255) * 0.15;
                const aiScale = 1 + (aiVol / 255) * 0.8;

                UI.callBtn.style.setProperty('--mic-scale', micScale);
                UI.orbContainer.style.setProperty('--ai-scale', aiScale);

                visualizerId = requestAnimationFrame(render);
            }
            render();
        }

        function float32ToBase64(float32Array) {
            let buffer = new ArrayBuffer(float32Array.length * 2);
            let view = new DataView(buffer);
            for (let i = 0; i < float32Array.length; i++) {
                let s = Math.max(-1, Math.min(1, float32Array[i]));
                view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            let binary = '';
            let bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
            return btoa(binary);
        }

        function playAudioBase64(base64) {
            if (!audioContext) return;

            let binary = atob(base64);
            let buffer = new ArrayBuffer(binary.length);
            let view = new DataView(buffer);
            for (let i = 0; i < binary.length; i++) { view.setUint8(i, binary.charCodeAt(i)); }

            const int16Array = new Int16Array(buffer);
            const audioBuffer = audioContext.createBuffer(1, int16Array.length, 24000);
            const channelData = audioBuffer.getChannelData(0);

            for (let i = 0; i < int16Array.length; i++) { channelData[i] = int16Array[i] / 32768.0; }

            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;

            // Connect AI audio to our Visualizer Analyser Node
            source.connect(aiAnalyser);
            aiAnalyser.connect(audioContext.destination);

            const startTime = Math.max(audioContext.currentTime, nextPlayTime);
            source.start(startTime);
            nextPlayTime = startTime + audioBuffer.duration;

            activeSources.push(source);
            source.onended = () => { activeSources = activeSources.filter(s => s !== source); };
        }

        function showImageModal(imageUrl, prompt) {
            UI.imageModalSrc.src = imageUrl;
            UI.imageModalPrompt.innerText = `"${prompt}"`;
            UI.downloadImageBtn.href = imageUrl;
            UI.imageModal.classList.remove('hidden');
        }

        function addImageMessage(imageUrl, prompt, typeClass) {
            const container = document.createElement('div');
            container.className = `message ${typeClass}`;
            container.style.cursor = 'pointer';
            container.style.display = 'flex';
            container.style.alignItems = 'center';
            container.style.gap = '0.5rem';
            container.style.textDecoration = 'underline';
            container.innerHTML = `🎨 <strong>Generated:</strong> "${prompt}" (Click to view)`;
            
            container.addEventListener('click', () => {
                showImageModal(imageUrl, prompt);
            });

            UI.transcript.appendChild(container);
            UI.transcript.scrollTop = UI.transcript.scrollHeight;
            activeBubble = null;
            activeRole = null;
            
            // Automatically open lightbox modal
            showImageModal(imageUrl, prompt);
        }

        function updateStatus(text, dotClass) {
            UI.statusText.innerText = text; UI.statusDot.className = `dot ${dotClass}`;
        }
        function addToolCard(text) {
            const card = document.createElement('pre'); card.className = 'tool-card'; card.innerText = text;
            UI.transcript.appendChild(card); UI.transcript.scrollTop = UI.transcript.scrollHeight;
            activeBubble = null; activeRole = null;
        }
        function setSpeakingState(isSpeaking) {
            if (isSpeaking) {
                UI.orbContainer.classList.add('speaking-mode'); updateStatus('Agent Speaking...', 'speaking');
            } else {
                UI.orbContainer.classList.remove('speaking-mode'); if (isCallActive) updateStatus('Listening...', 'live');
            }
        }
        function addMessage(text, typeClass, isChunk = false) {
            if (isChunk) {
                if (activeBubble && activeRole === typeClass) {
                    activeBubble.innerText += text; UI.transcript.scrollTop = UI.transcript.scrollHeight; return;
                }
                activeBubble = document.createElement('div'); activeBubble.className = `message ${typeClass}`; activeBubble.innerText = text;
                UI.transcript.appendChild(activeBubble); activeRole = typeClass;
            } else {
                const msg = document.createElement('div'); msg.className = `message ${typeClass}`; msg.innerText = text;
                UI.transcript.appendChild(msg); activeBubble = null; activeRole = null;
            }
            UI.transcript.scrollTop = UI.transcript.scrollHeight;
        }

        // Lightbox Event Listeners
        UI.closeImageModalBtn.addEventListener('click', () => {
            UI.imageModal.classList.add('hidden');
        });

        UI.imageModal.addEventListener('click', (e) => {
            if (e.target === UI.imageModal) {
                UI.imageModal.classList.add('hidden');
            }
        });
    </script>
